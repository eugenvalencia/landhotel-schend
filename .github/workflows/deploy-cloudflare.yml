name: Deploy zu Cloudflare Pages

# Bei jedem Push auf main wird gebaut und nach Cloudflare Pages deployed.
# Branches/PRs werden als Preview-Deploys publiziert (preview-URL im PR-Comment).
#
# Voraussetzungen (Repo-Secrets):
#   CLOUDFLARE_API_TOKEN — Account-Token mit Permission "Account.Cloudflare Pages: Edit"
#                          (zone-scoped Token reicht NICHT — Pages braucht Account-Level)
#   CLOUDFLARE_ACCOUNT_ID — 93a6fc988f6bf06f077c05fa630cd5df
#   (Beide einmalig setzen unter Settings → Secrets and variables → Actions)

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build + Cloudflare Pages Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      # Öffentliche Seite = Astro SSG (DR-029, srcDir ./site → dist-astro).
      # Bringt auch public/_redirects = die SaaS-Weiche mit in den Output.
      - name: Astro build (öffentliche SSG-Seite)
        run: npm run build:site

      # SaaS = React/Vite-App (src/): Login, Hotelier-Dashboard, Operator, Buchung.
      # Braucht die Supabase-Keys zur Build-Zeit (VITE_*-Env).
      - name: React/Vite build (SaaS)
        env:
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: npm run build

      # SaaS-Weiche zusammenführen: React-Shell → /_saas/index.html, React-Assets →
      # /assets (Astro liegt unter /_astro, keine Kollision). Das Routing der Pfade
      # /login, /dashboard, /operator … auf die Shell macht public/_redirects.
      - name: SaaS in Astro-Output einbetten
        run: |
          mkdir -p dist-astro/_saas
          cp dist/index.html dist-astro/_saas/index.html
          cp -r dist/assets dist-astro/assets

      - name: Deploy zu Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-astro --project-name=landhotel-schend --branch=${{ github.head_ref || github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Verifikation HTTPS (nur auf main)
        if: github.ref == 'refs/heads/main'
        run: |
          sleep 8
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" https://schend.conexadigital.eu)
          TITLE=$(curl -s https://schend.conexadigital.eu | grep -oE '<title[^>]*>[^<]+</title>' | head -1 | sed 's/<[^>]*>//g')
          echo "::notice::HTTP $HTTP — $TITLE"
          [ "$HTTP" = "200" ]
