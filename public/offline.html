<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Einen Moment – Landhotel Schend</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #1a1d2c;
      color: #f5f1e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }
    .frame { max-width: 720px; width: 100%; text-align: center; position: relative; }
    .eyebrow { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: #b9905a; margin-bottom: 18px; }
    h1 { font-family: "Cormorant Garamond", "Times New Roman", serif; font-size: clamp(36px, 6vw, 64px); line-height: 1.05; margin: 0 0 18px; }
    p.lead { color: rgba(245,241,232,0.8); line-height: 1.6; max-width: 480px; margin: 0 auto 32px; font-size: 17px; }
    .stage {
      position: relative;
      height: 160px;
      margin: 0 auto 32px;
      max-width: 640px;
      overflow: hidden;
    }
    .horizon { position: absolute; bottom: 38px; left: 0; right: 0; height: 1px; background: rgba(245,241,232,0.1); }
    .mountains { position: absolute; bottom: 38px; left: 0; right: 0; width: 100%; height: 40px; opacity: 0.22; color: #5d6c4e; }
    .ground { position: absolute; bottom: 28px; left: 0; right: 0; height: 2px; background: linear-gradient(to right, transparent, rgba(245,241,232,0.15), transparent); }
    .runner { position: absolute; bottom: 28px; }
    .runner.hase  { height: 90px;  animation: runner 7s linear infinite; }
    .runner.wolf  { height: 108px; animation: runner 7s linear infinite; animation-delay: 0.9s; }
    @keyframes runner {
      0%   { right: -110px; transform: translateY(0); }
      15%  { transform: translateY(-4px); }
      30%  { transform: translateY(0); }
      45%  { transform: translateY(-4px); }
      60%  { transform: translateY(0); }
      100% { right: calc(100% + 30px); }
    }
    .leg-back  { transform-origin: 62px 92px;  animation: leg-back 0.3s ease-in-out infinite alternate; }
    .leg-front { transform-origin: 40px 100px; animation: leg-front 0.3s ease-in-out infinite alternate-reverse; }
    .arm-front { transform-origin: 30px 70px;  animation: arm-front 0.4s ease-in-out infinite alternate; }
    .arm-grab  { transform-origin: 32px 60px;  animation: arm-front 0.4s ease-in-out infinite alternate-reverse; }
    @keyframes leg-back  { from { transform: rotate(-32deg); } to { transform: rotate(28deg); } }
    @keyframes leg-front { from { transform: rotate(-28deg); } to { transform: rotate(32deg); } }
    @keyframes arm-front { from { transform: rotate(-12deg); } to { transform: rotate(18deg); } }
    @media (prefers-reduced-motion: reduce) {
      .runner, .leg-back, .leg-front, .arm-front, .arm-grab { animation: none !important; }
      .runner.hase { right: 30%; } .runner.wolf { right: 55%; }
    }
    .actions { display: flex; flex-direction: column; gap: 12px; justify-content: center; align-items: stretch; }
    @media (min-width: 480px) { .actions { flex-direction: row; align-items: center; } }
    .btn { display: inline-flex; align-items: center; justify-content: center; height: 44px; padding: 0 28px; border-radius: 4px; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; text-decoration: none; border: 1px solid transparent; transition: opacity 200ms; cursor: pointer; font-family: inherit; }
    .btn.primary { background: #b9905a; color: #1a1d2c; }
    .btn.primary:hover { opacity: 0.9; }
    .btn.ghost   { border-color: rgba(185,144,90,0.4); color: #f5f1e8; background: transparent; }
    .btn.ghost:hover { background: rgba(185,144,90,0.08); }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Landhotel Schend</p>
    <h1>Einen Moment, bitte</h1>
    <p class="lead">Wir polieren gerade die Vulkaneifel-Aussicht. Gleich da — danke fürs Geduldhaben.</p>

    <div class="stage" aria-hidden="true">
      <div class="horizon"></div>
      <svg class="mountains" viewBox="0 0 600 40" preserveAspectRatio="none">
        <path d="M0,40 L60,20 L120,30 L190,10 L260,26 L330,8 L410,24 L490,14 L600,30 L600,40 Z" fill="currentColor" />
      </svg>
      <div class="ground"></div>

      <!-- HASE: laeuft vor, panisch nach hinten schauend -->
      <svg class="runner hase" viewBox="0 0 100 110">
        <ellipse cx="50" cy="105" rx="22" ry="2.5" fill="#000" opacity="0.18" />
        <g class="leg-back">
          <path d="M55 84 Q72 78 70 94 Q66 100 56 96 Z" fill="#d8c6a8" />
          <ellipse cx="62" cy="96" rx="7" ry="3" fill="#c9b292" />
        </g>
        <path d="M28 70 Q28 86 42 88 L60 88 Q72 86 70 70 Z" fill="#1f5d3a" />
        <ellipse cx="46" cy="58" rx="22" ry="18" fill="#2f7a4f" />
        <path d="M40 50 L52 50 L46 62 Z" fill="#f5f1e8" />
        <circle cx="74" cy="68" r="5" fill="#f5f1e8" />
        <g class="arm-front">
          <path d="M30 64 Q22 58 16 64 Q18 70 28 70 Z" fill="#d8c6a8" />
        </g>
        <ellipse cx="26" cy="42" rx="14" ry="13" fill="#d8c6a8" />
        <ellipse cx="16" cy="46" rx="6" ry="4" fill="#e8d8b8" />
        <circle cx="13" cy="45" r="1.5" fill="#1a1d2c" />
        <circle cx="28" cy="40" r="3.5" fill="#fff" />
        <circle cx="30" cy="41" r="2" fill="#3a6fa8" />
        <circle cx="30.5" cy="40" r="0.8" fill="#fff" />
        <path d="M14 50 Q18 53 22 51" stroke="#a8503a" stroke-width="1.2" fill="none" />
        <path d="M22 30 Q20 14 24 8 Q28 16 26 30 Z" fill="#d8c6a8" />
        <path d="M24 28 Q23 18 26 12 Q27 20 26 28 Z" fill="#f5c8d0" opacity="0.7" />
        <path d="M32 30 Q40 22 44 14 Q44 24 38 32 Z" fill="#d8c6a8" />
        <path d="M34 30 Q40 24 42 18 Q42 25 38 30 Z" fill="#f5c8d0" opacity="0.7" />
        <ellipse cx="22" cy="20" rx="1.5" ry="3" fill="#7fc1ff" opacity="0.85" />
      </svg>

      <!-- WOLF: Bowler-Hut, rosa Hemd, schwarze Hose, jagt -->
      <svg class="runner wolf" viewBox="0 0 120 120">
        <ellipse cx="60" cy="115" rx="30" ry="3" fill="#000" opacity="0.2" />
        <g class="leg-back">
          <path d="M72 88 L78 110 L88 110 L86 88 Z" fill="#1a1d2c" />
          <ellipse cx="83" cy="112" rx="8" ry="2.5" fill="#0e1018" />
        </g>
        <path d="M30 60 Q28 50 38 46 L80 46 Q92 50 90 64 L92 88 Q90 96 80 96 L40 96 Q30 96 28 88 Z" fill="#d97296" />
        <line x1="60" y1="50" x2="60" y2="92" stroke="#a8456c" stroke-width="1.2" />
        <circle cx="60" cy="58" r="1.5" fill="#a8456c" />
        <circle cx="60" cy="70" r="1.5" fill="#a8456c" />
        <circle cx="60" cy="82" r="1.5" fill="#a8456c" />
        <path d="M56 46 L64 46 L62 56 Z" fill="#d83a5e" />
        <path d="M58 56 L66 56 L62 76 Z" fill="#d83a5e" />
        <g class="leg-front">
          <path d="M36 88 L34 110 L46 110 L44 88 Z" fill="#1a1d2c" />
          <ellipse cx="40" cy="112" rx="8" ry="2.5" fill="#0e1018" />
        </g>
        <g class="arm-grab">
          <path d="M30 60 Q14 56 8 62 Q10 70 26 70 Z" fill="#6e7484" />
          <path d="M8 62 L4 60 M10 64 L4 66 M12 68 L8 72" stroke="#1a1d2c" stroke-width="1" />
        </g>
        <path d="M85 70 Q98 66 102 74 Q98 80 88 78 Z" fill="#6e7484" />
        <ellipse cx="34" cy="34" rx="20" ry="18" fill="#6e7484" />
        <path d="M18 38 Q8 36 4 44 Q8 50 22 46 Z" fill="#6e7484" />
        <ellipse cx="6" cy="43" rx="3" ry="2" fill="#1a1d2c" />
        <path d="M8 46 Q18 52 26 48" stroke="#1a1d2c" stroke-width="1.5" fill="none" />
        <path d="M14 48 L14 51 L16 51 Z M19 48 L19 51 L21 51 Z" fill="#fff" />
        <circle cx="28" cy="30" r="4" fill="#fff" />
        <ellipse cx="22" cy="31" rx="2.2" ry="2.8" fill="#1a1d2c" />
        <circle cx="22" cy="29.5" r="0.6" fill="#fff" />
        <path d="M18 24 L30 27" stroke="#1a1d2c" stroke-width="1.8" fill="none" stroke-linecap="round" />
        <path d="M40 22 L50 8 L48 24 Z" fill="#6e7484" />
        <path d="M42 22 L48 14 L46 22 Z" fill="#f5c8d0" opacity="0.7" />
        <path d="M22 18 Q26 12 32 16 Q36 10 42 18 Q46 14 50 22 L46 26 Q40 22 36 24 Q30 20 26 24 Q22 22 22 18 Z" fill="#1a1d2c" />
        <ellipse cx="36" cy="14" rx="20" ry="3" fill="#1a1d2c" />
        <path d="M22 14 Q22 4 36 4 Q50 4 50 14 Z" fill="#1a1d2c" />
        <ellipse cx="36" cy="13" rx="14" ry="2" fill="#2a2d40" />
        <ellipse cx="55" cy="18" rx="2" ry="4" fill="#7fc1ff" opacity="0.85" />
      </svg>
    </div>

    <div class="actions">
      <a href="/" class="btn ghost">Zur Startseite</a>
      <button type="button" class="btn primary" onclick="location.reload()">Nochmal versuchen</button>
    </div>
  </div>
</body>
</html>
