<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Einen Moment – Landhaus Schend</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #1a1d2c;
      color: #f5f1e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }
    .frame { max-width: 720px; width: 100%; text-align: center; position: relative; }
    .eyebrow { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: #b9905a; margin-bottom: 18px; }
    h1 { font-family: "Cormorant Garamond", "Times New Roman", serif; font-size: clamp(36px, 6vw, 64px); line-height: 1.05; margin: 0 0 18px; }
    p.lead { color: rgba(245,241,232,0.8); line-height: 1.6; max-width: 480px; margin: 0 auto 32px; font-size: 17px; }
    .stage { position: relative; height: 180px; margin: 0 auto 32px; max-width: 640px; overflow: hidden; }
    .horizon { position: absolute; bottom: 48px; left: 0; right: 0; height: 1px; background: rgba(245,241,232,0.18); }
    .mountains { position: absolute; bottom: 48px; left: 0; right: 0; width: 100%; height: 44px; opacity: 0.25; color: #5d6c4e; }
    .ground { position: absolute; bottom: 40px; left: 0; right: 0; height: 4px; background: linear-gradient(to right, transparent, rgba(245,241,232,0.1), transparent); }
    .runner { position: absolute; bottom: 48px; }
    .runner.hase { height: 100px; animation: runner 7s linear infinite; }
    .runner.wolf { height: 120px; animation: runner 7s linear infinite; animation-delay: 0.9s; }
    @keyframes runner {
      0%   { right: -120px; transform: translateY(0); }
      15%  { transform: translateY(-5px); }
      30%  { transform: translateY(0); }
      45%  { transform: translateY(-5px); }
      60%  { transform: translateY(0); }
      100% { right: calc(100% + 30px); }
    }
    .leg-back  { transform-origin: 60px 100px; animation: leg-back 0.28s ease-in-out infinite alternate; }
    .leg-back-wolf { transform-origin: 94px 110px; animation: leg-back 0.28s ease-in-out infinite alternate; }
    .leg-front { transform-origin: 46px 110px; animation: leg-front 0.28s ease-in-out infinite alternate-reverse; }
    .arm-front { transform-origin: 26px 70px;  animation: arm-front 0.36s ease-in-out infinite alternate; }
    .arm-grab  { transform-origin: 32px 68px;  animation: arm-grab 0.4s ease-in-out infinite alternate-reverse; }
    @keyframes leg-back  { from { transform: rotate(-36deg); } to { transform: rotate(30deg); } }
    @keyframes leg-front { from { transform: rotate(-32deg); } to { transform: rotate(36deg); } }
    @keyframes arm-front { from { transform: rotate(-14deg); } to { transform: rotate(22deg); } }
    @keyframes arm-grab  { from { transform: rotate(-8deg); }  to { transform: rotate(14deg); } }
    @media (prefers-reduced-motion: reduce) {
      .runner, .leg-back, .leg-back-wolf, .leg-front, .arm-front, .arm-grab { animation: none !important; }
      .runner.hase { right: 30%; } .runner.wolf { right: 55%; }
    }
    .actions { display: flex; flex-direction: column; gap: 12px; justify-content: center; align-items: stretch; }
    @media (min-width: 480px) { .actions { flex-direction: row; align-items: center; } }
    .btn { display: inline-flex; align-items: center; justify-content: center; height: 44px; padding: 0 28px; border-radius: 4px; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; text-decoration: none; border: 1px solid transparent; transition: opacity 200ms; cursor: pointer; font-family: inherit; }
    .btn.primary { background: #b9905a; color: #1a1d2c; }
    .btn.primary:hover { opacity: 0.9; }
    .btn.ghost { border-color: rgba(185,144,90,0.4); color: #f5f1e8; background: transparent; }
    .btn.ghost:hover { background: rgba(185,144,90,0.08); }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Landhaus Schend</p>
    <h1>Einen Moment, bitte</h1>
    <p class="lead">Wir polieren gerade die Vulkaneifel-Aussicht. Gleich da — danke fürs Geduldhaben.</p>

    <div class="stage" aria-hidden="true">
      <svg class="mountains" viewBox="0 0 600 44" preserveAspectRatio="none">
        <path d="M0,44 L50,18 L110,32 L180,8 L260,28 L340,6 L420,24 L500,12 L600,32 L600,44 Z" fill="currentColor" />
      </svg>
      <div class="horizon"></div>
      <div class="ground"></div>

      <!-- HASE -->

        <g class="leg-back">
          <path d="M52 92 Q72 88 78 100 Q72 110 54 104 Z" fill="#d8c6a8" />
          <ellipse cx="70" cy="106" rx="9" ry="3.5" fill="#ffffff" />
          <ellipse cx="70" cy="105" rx="9" ry="1.2" fill="#e8e2d4" />
        </g>
        <path d="M28 78 Q24 95 38 100 L60 100 Q74 95 70 78 Z" fill="#1f5d3a" />
        <line x1="49" y1="80" x2="49" y2="100" stroke="#143d24" stroke-width="1.2" />
        <rect x="26" y="74" width="46" height="6" fill="#f5f1e8" />
        <rect x="44" y="74" width="6" height="6" fill="#b9905a" />
        <rect x="46" y="76" width="2" height="2" fill="#1a1d2c" />
        <path d="M22 62 Q22 50 30 46 L66 46 Q76 50 76 62 L76 76 Q76 78 74 78 L24 78 Q22 78 22 76 Z" fill="#2f7a4f" />
        <ellipse cx="34" cy="44" rx="11" ry="6" fill="#246238" />
        <ellipse cx="34" cy="42" rx="9" ry="4" fill="#2f7a4f" />
        <path d="M44 54 L60 54 L52 70 Z" fill="#f5f1e8" />
        <circle cx="74" cy="76" r="6" fill="#f5f1e8" />
        <g class="arm-front">
          <path d="M26 64 Q14 58 8 64 Q10 72 24 72 Z" fill="#d8c6a8" />
          <path d="M8 64 L4 62 M9 66 L4 66 M10 68 L6 70" stroke="#a8957a" stroke-width="0.8" />
        </g>
        <ellipse cx="28" cy="36" rx="15" ry="14" fill="#d8c6a8" />
        <ellipse cx="16" cy="42" rx="7" ry="5" fill="#ece1c9" />
        <ellipse cx="11" cy="41" rx="2" ry="1.6" fill="#1a1d2c" />
        <ellipse cx="22" cy="46" rx="4" ry="2" fill="#ece1c9" opacity="0.6" />
        <circle cx="32" cy="34" r="5" fill="#ffffff" />
        <circle cx="35" cy="35" r="3" fill="#3a6fa8" />
        <circle cx="36" cy="34" r="1.2" fill="#ffffff" />
        <path d="M28 27 Q34 24 38 26" stroke="#1a1d2c" stroke-width="1.4" fill="none" stroke-linecap="round" />
        <ellipse cx="14" cy="46" rx="3" ry="2" fill="#a8503a" />
        <ellipse cx="14" cy="45" rx="2" ry="1" fill="#d8c6a8" />
        <path d="M9 43 L2 41 M9 45 L2 45 M9 47 L2 49" stroke="#a8957a" stroke-width="0.5" />
        <path d="M22 22 Q18 4 22 0 Q28 6 26 22 Z" fill="#d8c6a8" />
        <path d="M23 20 Q21 8 24 4 Q26 10 25 20 Z" fill="#f5c8d0" opacity="0.85" />
        <path d="M34 22 Q42 14 46 4 Q46 18 38 24 Z" fill="#d8c6a8" />
        <path d="M35 22 Q40 16 43 8 Q43 18 38 22 Z" fill="#f5c8d0" opacity="0.85" />
        <ellipse cx="44" cy="14" rx="2" ry="3.5" fill="#7fc1ff" />
        <ellipse cx="42" cy="13" rx="0.6" ry="1" fill="#a8dfff" />
      </svg>

      <!-- WOLF -->
      <svg class="runner wolf" viewBox="0 0 140 140">
        <ellipse cx="70" cy="135" rx="34" ry="3" fill="#000" opacity="0.22" />
        <g class="leg-back-wolf">
          <path d="M86 96 L92 130 L104 130 L102 96 Z" fill="#1a1d2c" />
          <line x1="94" y1="98" x2="97" y2="128" stroke="#000" stroke-width="0.8" opacity="0.5" />
          <ellipse cx="98" cy="132" rx="11" ry="3" fill="#000" />
          <path d="M88 132 Q90 128 100 128 Q108 128 108 132 Z" fill="#1f2435" />
        </g>
        <path d="M28 70 Q22 56 38 52 L92 52 Q108 56 108 72 L112 100 Q108 110 96 110 L44 110 Q28 110 26 100 Q24 88 28 70 Z" fill="#d97296" />
        <ellipse cx="70" cy="92" rx="42" ry="18" fill="#d97296" />
        <ellipse cx="70" cy="95" rx="40" ry="14" fill="#c5618a" opacity="0.3" />
        <line x1="70" y1="56" x2="70" y2="106" stroke="#a8456c" stroke-width="1.3" />
        <circle cx="70" cy="64" r="1.6" fill="#a8456c" />
        <circle cx="70" cy="76" r="1.6" fill="#a8456c" />
        <circle cx="70" cy="88" r="1.6" fill="#a8456c" />
        <circle cx="70" cy="100" r="1.6" fill="#a8456c" />
        <path d="M66 52 L74 52 L72 64 Z" fill="#d83a5e" />
        <path d="M68 64 L76 64 L72 84 Z" fill="#d83a5e" />
        <ellipse cx="70" cy="52" rx="4" ry="1.5" fill="#a82846" />
        <g class="leg-front">
          <path d="M40 96 L36 130 L52 130 L50 96 Z" fill="#1a1d2c" />
          <line x1="44" y1="98" x2="46" y2="128" stroke="#000" stroke-width="0.8" opacity="0.5" />
          <ellipse cx="44" cy="132" rx="11" ry="3" fill="#000" />
          <path d="M34 132 Q36 128 46 128 Q54 128 54 132 Z" fill="#1f2435" />
        </g>
        <g class="arm-grab">
          <ellipse cx="32" cy="68" rx="5" ry="6" fill="#a8456c" />
          <path d="M30 64 Q14 60 6 66 Q8 76 26 76 Z" fill="#6e7484" />
          <ellipse cx="8" cy="70" rx="6" ry="4" fill="#6e7484" />
          <path d="M3 67 L0 64 M2 70 L-2 70 M3 73 L0 76" stroke="#1a1d2c" stroke-width="1.6" stroke-linecap="round" />
        </g>
        <ellipse cx="98" cy="76" rx="10" ry="6" fill="#6e7484" />
        <ellipse cx="106" cy="78" rx="5" ry="3" fill="#6e7484" />
        <ellipse cx="38" cy="34" rx="22" ry="20" fill="#6e7484" />
        <ellipse cx="32" cy="40" rx="10" ry="6" fill="#8088a0" opacity="0.4" />
        <path d="M20 38 Q6 36 2 46 Q8 54 24 50 Z" fill="#6e7484" />
        <ellipse cx="14" cy="44" rx="6" ry="4" fill="#8088a0" />
        <ellipse cx="4" cy="44" rx="3" ry="2.2" fill="#1a1d2c" />
        <ellipse cx="3" cy="43" rx="0.8" ry="0.5" fill="#5a5e72" />
        <path d="M6 48 Q14 54 26 50" stroke="#1a1d2c" stroke-width="1.6" fill="none" stroke-linecap="round" />
        <path d="M11 49 L11 54 L14 54 L14 49 Z" fill="#f0d97a" stroke="#a88a3a" stroke-width="0.4" />
        <path d="M18 49 L18 52 L20 52 L20 49 Z" fill="#f5f1e8" />
        <ellipse cx="32" cy="28" rx="5" ry="4" fill="#ffffff" />
        <ellipse cx="26" cy="30" rx="2.6" ry="3.2" fill="#1a1d2c" />
        <circle cx="26" cy="28" r="0.8" fill="#ffffff" />
        <path d="M22 20 Q28 16 36 22" stroke="#1a1d2c" stroke-width="2.4" fill="none" stroke-linecap="round" />
        <path d="M46 18 L56 2 L54 22 Z" fill="#6e7484" />
        <path d="M48 18 L54 10 L52 20 Z" fill="#f5c8d0" opacity="0.7" />
        <path d="M18 18 Q22 8 28 12 Q32 4 38 14 Q44 6 48 16 Q54 10 56 22 L52 28 Q46 22 42 24 Q36 18 32 22 Q26 16 22 24 Q18 22 18 18 Z" fill="#1a1d2c" />
        <path d="M20 22 L16 28 M24 22 L20 32 M30 20 L28 30 M42 22 L46 30 M48 24 L52 30" stroke="#1a1d2c" stroke-width="1.6" stroke-linecap="round" />
        <ellipse cx="38" cy="14" rx="24" ry="3.5" fill="#0e1018" />
        <path d="M20 14 Q20 -2 38 -2 Q56 -2 56 14 Z" fill="#1a1d2c" />
        <rect x="20" y="11" width="36" height="3" fill="#0e1018" />
        <ellipse cx="32" cy="6" rx="6" ry="2" fill="#3a3e4f" opacity="0.6" />
        <ellipse cx="62" cy="22" rx="2" ry="4" fill="#7fc1ff" />
        <ellipse cx="60" cy="20" rx="0.6" ry="1.2" fill="#a8dfff" />
      </svg>
    </div>

    <div class="actions">
      <a href="/" class="btn ghost">Zur Startseite</a>
      <button type="button" class="btn primary" onclick="location.reload()">Nochmal versuchen</button>
    </div>
  </div>
</body>
</html>
